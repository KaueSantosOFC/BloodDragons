version: '3.8'

services:
  # Backend Java (Spring Boot)
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - uploads-data:/app/uploads
      - campaign-data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/compendium/classes"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Angular (Nginx)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  uploads-data:
  campaign-data:
