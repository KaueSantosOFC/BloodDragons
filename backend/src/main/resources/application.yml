server:
  port: 8080

spring:
  application:
    name: blooddragons-api
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false

# Diretório de uploads (pode ser overridden via env)
blooddragons:
  uploads-dir: ./uploads
  data-dir: ./data
